name: Build and Push rhel10-bootc-server

on:
  push:
    branches: [main]
    paths:
      - 'Containerfile'
      - 'etc/**'
  workflow_call:
  workflow_dispatch:

env:
  IMAGE_NAME: quay.io/crunchtools/rhel10-bootc-server
  BUILDAH_FORMAT: oci

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Free up runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo docker image prune --all --force
          df -h /

      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version tag
        id: version
        run: |
          TAG=$(git describe --tags --always 2>/dev/null || echo "v0.1.0")
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to registry.redhat.io
        uses: redhat-actions/podman-login@v1
        with:
          registry: registry.redhat.io
          username: ${{ secrets.REGISTRY_REDHAT_IO_USER }}
          password: ${{ secrets.REGISTRY_REDHAT_IO_PASSWORD }}

      - name: Log in to quay.io
        run: |
          podman login quay.io \
            -u '${{ secrets.QUAY_USERNAME }}' \
            -p '${{ secrets.QUAY_PASSWORD }}'

      - name: Build image with Podman
        env:
          RHSM_ACTIVATION_KEY: ${{ secrets.RHSM_ACTIVATION_KEY }}
          RHSM_ORG_ID: ${{ secrets.RHSM_ORG_ID }}
        run: |
          printf '%s' "$RHSM_ACTIVATION_KEY" > activation_key.txt
          printf '%s' "$RHSM_ORG_ID" > org_id.txt
          podman build \
            --secret id=activation_key,src=activation_key.txt \
            --secret id=org_id,src=org_id.txt \
            --tag ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }} \
            --tag ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.sha_short }} \
            --tag ${{ env.IMAGE_NAME }}:latest \
            .
          rm -f activation_key.txt org_id.txt

      - name: Push image to Quay.io
        run: |
          podman push ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}
          podman push ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.sha_short }}
          podman push ${{ env.IMAGE_NAME }}:latest
